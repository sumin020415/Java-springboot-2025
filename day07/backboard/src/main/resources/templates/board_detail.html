<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 상세</title>
    <link rel="stylesheet" type="text/css" th:href="@{/main.css}">
</head>
<body>
    <h1 th:text="${board.title}"></h1>
    <div th:text="${board.content}"></div>

    <hr>
    <h4 th:text="|${#lists.size(board.replyList)}개의 댓글이 있습니다|"></h4>
    <div>
        <ul>
            <li th:each="reply : ${board.replyList}" th:text="${reply.content}"></li>
        </ul>
    </div>


    <form th:action="@{|/reply/create/${board.bno}|}" method="post">
        <textarea name="content" id="content" rows="5"></textarea><br>
        <input type="submit" value="댓글저장">
    </form>
</body>
</html>
